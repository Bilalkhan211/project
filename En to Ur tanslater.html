<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Translator PRO</title>

<style>
body {
    font-family: 'Segoe UI';
    background:black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin:0;
}

.container {
    width: 420px;
    font-family: 'Times New Roman', Times, serif;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 5px 5px 40px springgreen;
    animation: fade 1s ease;
}

h2 {
     text-align: center;
     font-family: 'Times New Roman', Times, serif;
     font-size: 30px;
}

textarea {
    width: 100%;
    height: 80px;
    border-radius: 12px;
    padding: 10px;
    border: none;
    margin-bottom: 10px;
    outline: none;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    margin-top: 6px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { transform: scale(1.05); }

.translate { background:darkgoldenrod; color:white; }
.mic { background:darkgoldenrod; color:white; }
.dark { background:#333; color:white; }

.speaker {
    background: #1a6e3c;
    color: white;
    font-size: 15px;
}
.speaker:disabled {
    background: #0f3d22;
    cursor: not-allowed;
    transform: none;
}

.result {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    min-height: 40px;
    animation: glow 2s infinite alternate;
    font-family: 'Times New Roman', Times, serif;
    font-size: 20px;
}

.resul{
    margin-top: 20px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    min-height: 60px;
    animation: glow 2s infinite alternate;
}

.badge {
    background:#00d4ff;
    color:black;
    padding:4px 10px;
    border-radius:10px;
    margin-left:5px;
}

@keyframes glow {
    from { box-shadow:0 0 5px #00d4ff; }
    to { box-shadow:0 0 20px #00d4ff; }
}

@keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}

h3{
    color:coral;
    text-align:end;
    margin-bottom: 0px;
    margin-top: 50px;
}
</style>
</head>

<body>

<div class="container">
    <h2>English to urdu translater</h2>

    <textarea id="inputText" placeholder="Type or Speak..."></textarea>

    <button class="mic" onclick="startVoice()">🎤 Speak</button>
    <button class="translate" onclick="translateText()">Translate</button>
    <button class="dark" onclick="toggleDark()">🌙 Toggle Mode</button>

    <div class="result" id="translation">Translation...</div>

    <button class="speaker" id="speakBtn" onclick="speakTranslation()">🔊 Translation </button>

    <div class="resul" id="related">Related Words...</div>
    <h3>Made by Arif khan</h3>
</div>

<script>

// 🎤 Voice Input
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.onresult = function(event) {
        document.getElementById("inputText").value = event.results[0][0].transcript;
        translateText();
    };
    recognition.start();
}

// ⚡ Live typing
document.getElementById("inputText").addEventListener("input", () => {
    translateText();
});

// 🌍 Detect Language
function detectLang(text) {
    return /[؀-ۿ]/.test(text) ? "ur" : "en";
}

// 🔄 Translate
async function translateText() {
    let text = document.getElementById("inputText").value;
    if (!text) return;

    let res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ur&de=arifkhankkhan002@gmail.com`);
    let data = await res.json();

    document.getElementById("translation").innerText = data.responseData.translatedText;

    getRelated(text);
}

// 🔊 Google Translate Audio — 100% kaam karta hai
function speakTranslation() {
    let translatedText = document.getElementById("translation").innerText;

    if (!translatedText || translatedText === "Translation...") {
        alert("Pehle koi lafz translate karo!");
        return;
    }

    let btn = document.getElementById("speakBtn");
    btn.textContent = "⏳ Load ho raha hai...";
    btn.disabled = true;

    // Google Translate TTS URL
    let audioUrl = "https://translate.google.com/translate_tts?ie=UTF-8&tl=ur&client=tw-ob&q=" + encodeURIComponent(translatedText);

    let audio = new Audio(audioUrl);

    audio.oncanplaythrough = function() {
        btn.textContent = "🔊 Bol raha hai...";
        audio.play();
    };

    audio.onended = function() {
        btn.textContent = "🔊 Translation Suno";
        btn.disabled = false;
    };

    audio.onerror = function() {
        // Fallback: browser ki built-in voice
        btn.textContent = "🔊 Translation Suno";
        btn.disabled = false;
        fallbackSpeak(translatedText);
    };

    audio.load();
}

// 🔁 Fallback agar Google block kare
function fallbackSpeak(text) {
    window.speechSynthesis.cancel();
    let utter = new SpeechSynthesisUtterance(text);
    utter.lang = "ur-PK";
    utter.rate = 0.85;

    let voices = window.speechSynthesis.getVoices();
    let urduVoice = voices.find(v => v.lang.includes("ur")) || voices.find(v => v.lang.includes("ar")) || null;
    if (urduVoice) utter.voice = urduVoice;

    window.speechSynthesis.speak(utter);
}

// 🔗 Related Words
async function getRelated(word) {
    let res = await fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(word)}`);
    let data = await res.json();
    let words = data.slice(0, 5).map(w => w.word).join(", ");
    document.getElementById("related").innerHTML = "Related: <span class='badge'>" + words + "</span>";
}

// 🌙 Dark Mode
function toggleDark() {
    let body = document.body;
    if (body.style.background.includes("0f2027")) {
        body.style.background = "#ffffff";
        body.style.color = "#000";
    } else {
        body.style.background = "linear-gradient(135deg,#0f2027,#203a43,#2c5364)";
        body.style.color = "#fff";
    }
}

</script>

</body>
</html>
